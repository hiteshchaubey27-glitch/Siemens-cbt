<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STA Admin Dashboard</title>
    <style>
        :root { --sidebar-width: 280px; --siemens-teal: #00828c; --dark-bg: #1a252f; }
        body { display: flex; margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; height: 100vh; overflow: hidden; }
        
        /* Sidebar Styling */
        .sidebar { width: var(--sidebar-width); background: #2d3e50; color: white; display: flex; flex-direction: column; height: 100vh; overflow-y: auto; }
        .sidebar-header { padding: 25px 20px; background: var(--dark-bg); font-weight: bold; font-size: 1.1rem; letter-spacing: 1px; border-bottom: 1px solid #3e4f5f; }
        
        /* Navigation Links */
        .nav-group { border-bottom: 1px solid #3e4f5f; }
        .nav-btn { width: 100%; text-align: left; padding: 15px 20px; background: none; border: none; color: white; cursor: pointer; font-size: 1rem; display: flex; justify-content: space-between; align-items: center; transition: 0.3s; }
        .nav-btn:hover { background: #3e4f5f; }
        
        /* Sub-topics (Hidden by default) */
        .sub-menu { background: #1a252f; display: none; flex-direction: column; }
        .sub-item { padding: 10px 20px 10px 40px; color: #bdc3c7; cursor: pointer; font-size: 0.9rem; text-decoration: none; border-left: 3px solid transparent; transition: 0.2s; }
        .sub-item:hover { color: white; background: var(--siemens-teal); }
        .sub-item.active { color: white; background: var(--siemens-teal); border-left: 3px solid #fff; }

        /* Main Content Area */
        .main-content { flex-grow: 1; padding: 40px; overflow-y: auto; display: flex; flex-direction: column; }
        .card { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 80px; }
        .q-row { display: flex; align-items: flex-start; gap: 15px; padding: 15px; border-bottom: 1px solid #eee; transition: 0.2s; }
        .q-row:hover { background: #fcfcfc; }
        
        /* Fixed Footer for Link Generation */
        .admin-footer { position: fixed; bottom: 0; right: 0; width: calc(100% - var(--sidebar-width)); background: white; padding: 15px 40px; border-top: 3px solid var(--siemens-teal); box-shadow: 0 -5px 15px rgba(0,0,0,0.05); }
        .btn-gen { background: var(--siemens-teal); color: white; border: none; padding: 12px 30px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .btn-gen:active { transform: scale(0.98); }
        #link-output { background: #eef9fa; padding: 12px; border: 1px dashed var(--siemens-teal); margin-top: 10px; border-radius: 4px; font-family: monospace; font-size: 0.85rem; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">SIEMENS | ADMIN</div>
        
        <div class="nav-group">
            <button class="nav-btn" onclick="filterByTopic('all')">🏠 Home (Show All)</button>
        </div>

        <div class="nav-group">
            <button class="nav-btn" onclick="toggleSubMenu('menu61')">📂 61st EA/EB <span>▼</span></button>
            <div id="menu61" class="sub-menu">
                </div>
        </div>

        <div class="nav-group">
            <button class="nav-btn" onclick="toggleSubMenu('menu62')">📂 62nd EA/EB <span>▼</span></button>
            <div id="menu62" class="sub-menu">
                </div>
        </div>
    </div>

    <div class="main-content">
        <h2 id="current-category-title">Select Questions</h2>
        <p style="color: #666;">Choose the questions you want to include in the exam and generate the link below.</p>

        <div id="question-list" class="card">
            </div>

        <div class="admin-footer">
            <button class="btn-gen" onclick="generateExamLink()">GENERATE EXAM LINK</button>
            <div id="link-output">Generated link will appear here...</div>
        </div>
    </div>

    <script src="questions.js"></script>
    <script>
        // --- 1. Sidebar Topic Mapping ---
        // This function automatically pulls sub-topics from masterQuestionBank
        function buildSidebar() {
            const menu62 = document.getElementById('menu62');
            menu62.innerHTML = "";

            // Loop through masterQuestionBank to find 62nd topics
            for (let topicName in masterQuestionBank) {
                // If the topic name contains "62nd", we add it to the sidebar
                if (topicName.includes("62nd")) {
                    // Extract the sub-topic name (e.g., "Fractions")
                    let displayLabel = topicName.split("-").pop().trim(); 
                    
                    let item = document.createElement('a');
                    item.className = "sub-item";
                    item.innerHTML = `• ${displayLabel}`;
                    item.onclick = () => filterByTopic(topicName);
                    menu62.appendChild(item);
                }
            }
        }

        // --- 2. Filtering Logic ---
        function filterByTopic(topic) {
            const list = document.getElementById('question-list');
            const title = document.getElementById('current-category-title');
            list.innerHTML = "";
            title.innerText = topic === 'all' ? "All Master Questions" : topic;

            for (let category in masterQuestionBank) {
                if (topic !== 'all' && category !== topic) continue;

                let section = document.createElement('div');
                section.innerHTML = `<h3 style="color:var(--siemens-teal); margin-top:20px; border-bottom:1px solid #ddd; padding-bottom:5px;">${category}</h3>`;
                
                masterQuestionBank[category].forEach(q => {
                    section.innerHTML += `
                        <div class="q-row">
                            <input type="checkbox" class="q-check" value="${q.id}" style="width:20px; height:20px; margin-top:3px;">
                            <div>
                                <strong>[${q.id}]</strong> ${q.q}<br>
                                <small style="color:#888;">Options: ${q.options.join(" | ")}</small>
                            </div>
                        </div>`;
                });
                list.appendChild(section);
            }
            
            // Highlight active link
            document.querySelectorAll('.sub-item').forEach(el => el.classList.remove('active'));
            if(event && event.currentTarget.classList) event.currentTarget.classList.add('active');
        }

        // --- 3. UI Helpers ---
        function toggleSubMenu(id) {
            const menu = document.getElementById(id);
            const isVisible = menu.style.display === "flex";
            menu.style.display = isVisible ? "none" : "flex";
        }

        function generateExamLink() {
            const checkboxes = document.querySelectorAll('.q-check:checked');
            const selectedIds = Array.from(checkboxes).map(cb => cb.value);
            
            if (selectedIds.length === 0) {
                alert("⚠️ Please select at least one question!");
                return;
            }

            const baseUrl = window.location.href.replace('admin.html', 'index.html');
            const finalUrl = `${baseUrl}?ids=${selectedIds.join(',')}`;
            
            const output = document.getElementById('link-output');
            output.innerHTML = `<strong>Share this link with students:</strong><br>${finalUrl}`;
            
            // Auto-copy to clipboard
            navigator.clipboard.writeText(finalUrl);
            alert("📋 Link generated and copied to clipboard!");
        }

        // Initialize on page load
        window.onload = () => {
            buildSidebar();
            filterByTopic('all');
        };
    </script>
</body>
</html>
